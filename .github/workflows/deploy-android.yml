name: Deploy to Play Store

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'supabase/**'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play track to deploy to'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - production

concurrency:
  group: deploy-android
  cancel-in-progress: false

jobs:
  deploy-android:
    name: Build & Deploy Android
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Create Play Store service account JSON
        run: echo '${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}' > play-store-key.json

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-store-key.json
          packageName: com.foodhub.delivery
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track || 'production' }}
          status: completed

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties
          rm -f play-store-key.json
