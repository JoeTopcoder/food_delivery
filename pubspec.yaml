name: food_driver
description: "MealHub — food delivery platform for the Cayman Islands."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.2+8

environment:
  sdk: ^3.9.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.8
  # get: REMOVED - not used, was pulling sign_in_with_apple transitively
  
  # State Management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  
  # Backend & Database
  supabase_flutter: ^2.1.0
  uuid: ^4.5.1
  
  # HTTP Requests
  http: ^1.6.0
  dio: ^5.9.2
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.5.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Payment Gateway
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  flutter_credit_card: ^4.1.0
  
  # Real-time & WebSocket
  socket_io_client: ^3.1.4
  
  # Date & Time
  intl: ^0.20.2
  
  # Image Loading
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  
  # Location & Maps (live driver tracking)
  geolocator: ^14.0.1
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # Notifications
  flutter_local_notifications: ^20.0.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_callkit_incoming: ">=3.0.0 <3.1.0"  # 3.1.1 has broken Android Kotlin (InAppCallManager unresolved)
  
  # Confetti animation
  confetti: ^0.8.0

  # Social sharing — 13.1.0 fixes KGP (Built-in Kotlin migration)
  share_plus: ^13.1.0

  # QR Code (for orders)
  qr_flutter: ^4.1.0
  
  # Validation
  form_validator: ^2.1.1
  agora_rtc_engine:
    path: packages/agora_rtc_engine
  permission_handler: ^12.0.1

  # AI Voice Assistant
  speech_to_text: 7.3.0  # 7.4.0 has K2 compiler conflict with Kotlin 2.3.0
  flutter_tts: ^4.2.5
  just_audio: ^0.9.42

  # Social Sign-In
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^8.1.0
  crypto: ^3.0.6
  flutter_stripe: ^11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  
  # Testing
  mockito: ^5.4.0
  flutter_launcher_icons: ^0.14.3
  # integration_test: temporarily removed — causes AAPT resource conflict in release builds
  #   sdk: flutter

# Force ffi 2.x so agora_rtc_engine 6.6.2 (needs ffi ^1.x) and
# flutter_local_notifications 20.x (needs ffi ^2.x via windows plugin) can coexist.
# ffi 2.x is backward-compatible with ffi 1.x code.
dependency_overrides:
  ffi: ^2.1.3
  iris_method_channel: ^2.2.5
  # ── KGP regression pins ──────────────────────────────────────────────────────
  # url_launcher_android 6.3.30 re-introduced KGP; 6.3.29 is the last clean build.
  url_launcher_android: 6.3.29
  # image_picker_android 0.8.13+17 introduced KGP; 0.8.13+16 is the last clean build.
  image_picker_android: 0.8.13+16
  # shared_preferences_android 2.4.26+ removed KGP application.
  shared_preferences_android: 2.4.26
  # webview_flutter_android 4.13.0 removed KGP application.
  webview_flutter_android: 4.13.0
  # ── Remaining KGP warnings (plugin authors must fix — no compatible upgrade exists) ──
  # flutter_callkit_incoming: stuck at 3.0.0 — 3.1.1 has InAppCallManager crash on Android
  # speech_to_text: stuck at 7.3.0 — 7.4.0 has Kotlin K2 compile failure
  # flutter_credit_card, flutter_tts, sign_in_with_apple: already at pub.dev latest (no fix released)

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/mealhub_logo.png
    - assets/adi-registration.properties

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/app_icon.png
